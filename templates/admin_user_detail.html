{% extends "base.html" %}
{% block content %}
<div class="admin-section">
  <h2>利用者詳細 (ID: {{ user['id'] }})</h2>

  <form method="post">
    <p><label>カードID:<br><input type="text" name="cardid" value="{{ user['card_id'] }}"></label></p>
    <p><label>許可 (1=可/0=不可):<br><input type="text" name="allow" value="{{ user['allow'] }}"></label></p>
    <p><label>残り利用回数:<br><input type="text" name="stock" value="{{ user['stock'] }}"></label></p>
    <p>登録日: {{ user['entry'] }}</p>
    <p>累計利用回数: {{ user['total'] }}</p>
    <button type="submit" class="btn">更新する</button>
    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">一覧に戻る</a>
  </form>

  <hr style="margin: 30px 0;">

  <form method="post" onsubmit="return confirm('この利用者を本当に削除しますか？\nこの操作は元に戻せません。');">
    <input type="hidden" name="action" value="delete">
    <button type="submit" class="btn btn-danger">この利用者を削除する</button>
  </form>

</div>
<style>
  .btn-danger { background-color: #dc3545; }
  .btn-danger:hover { background-color: #c82333; }
</style>
{% endblock %}
