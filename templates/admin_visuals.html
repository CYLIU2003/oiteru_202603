{% extends "base.html" %}
{% block content %}
<div class="admin-dashboard">
  <h2>📊 利用状況グラフ</h2>
  
  <div class="info-card">
    <h3>ℹ️ このページについて</h3>
    <p style="margin: 0;">排出成功記録（2026/1/22 19:20以降）の時間分布を表示しています。<br>
    <strong>総排出成功回数: {{ total_count }}回</strong></p>
  </div>
  
  <div class="chart-grid" style="margin-top: 24px;">
    <div class="chart-card">
      <h3>🕐 時間別利用回数
        <select id="dateSelector" style="margin-left: 12px; padding: 4px 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc;">
          <option value="all">全期間</option>
          {% for date in chart_data.available_dates %}
          <option value="{{ date }}">{{ date }}</option>
          {% endfor %}
        </select>
      </h3>
      <canvas id="hourlyChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>📅 日別利用回数</h3>
      <canvas id="dailyChart"></canvas>
    </div>
  </div>
  
  <div class="chart-card" style="margin-bottom: 24px;">
    <h3>📆 曜日別利用回数</h3>
    <div style="max-width: 400px; margin: 0 auto;">
      <canvas id="weeklyChart"></canvas>
    </div>
  </div>
  
  <div style="margin-top: 32px;">
    <a href="{{ url_for('admin_dashboard') }}" class="menu-btn gray">← 管理者メニューに戻る</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    // 共通オプション
    const commonOptions = {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                display: false
            }
        }
    };
    
    // 日付別データ（サーバーから渡される）
    const hourlyDataByDate = {{ chart_data.hourly_by_date | tojson }};
    const hourlyDataAll = {{ chart_data.hourly_data | tojson }};
    
    // 時間別グラフ
    const hourlyCtx = document.getElementById('hourlyChart').getContext('2d');
    const hourlyChart = new Chart(hourlyCtx, {
        type: 'bar',
        data: {
            labels: {{ chart_data.hourly_labels | tojson }},
            datasets: [{
                label: '利用回数',
                data: hourlyDataAll,
                backgroundColor: 'rgba(38, 168, 223, 0.7)',
                borderColor: 'rgba(38, 168, 223, 1)',
                borderWidth: 2,
                borderRadius: 6
            }]
        },
        options: {
            ...commonOptions,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
    
    // 日付セレクター変更イベント
    document.getElementById('dateSelector').addEventListener('change', function() {
        const selectedDate = this.value;
        let newData;
        if (selectedDate === 'all') {
            newData = hourlyDataAll;
        } else {
            newData = hourlyDataByDate[selectedDate] || hourlyDataAll;
        }
        hourlyChart.data.datasets[0].data = newData;
        hourlyChart.update();
    });
    
    // 日別グラフ
    const dailyCtx = document.getElementById('dailyChart').getContext('2d');
    new Chart(dailyCtx, {
        type: 'line',
        data: {
            labels: {{ chart_data.daily_labels | tojson }},
            datasets: [{
                label: '利用回数',
                data: {{ chart_data.daily_data | tojson }},
                fill: true,
                backgroundColor: 'rgba(75, 192, 192, 0.1)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 3,
                tension: 0.3,
                pointBackgroundColor: 'rgba(75, 192, 192, 1)',
                pointRadius: 5,
                pointHoverRadius: 8
            }]
        },
        options: {
            ...commonOptions,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
    
    // 曜日別グラフ
    const weeklyCtx = document.getElementById('weeklyChart').getContext('2d');
    new Chart(weeklyCtx, {
        type: 'doughnut',
        data: {
            labels: {{ chart_data.weekly_labels | tojson }},
            datasets: [{
                label: '利用回数',
                data: {{ chart_data.weekly_data | tojson }},
                backgroundColor: [
                    '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF'
                ],
                borderWidth: 2,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        padding: 16,
                        font: { size: 13 }
                    }
                }
            }
        }
    });
});
</script>
{% endblock %}
