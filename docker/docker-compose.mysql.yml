services:
  # MySQLデータベース (親機のみ)
  mysql:
    image: mysql:8.0
    container_name: oiteru_mysql
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-oiteru}
      MYSQL_USER: ${MYSQL_USER:-oiteru_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - oiteru_network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ${MYSQL_USER:-oiteru_user} -p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Flaskアプリケーション
  flask:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mysql
    container_name: oiteru_flask
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ../server.py:/app/server.py
      - ../db_adapter.py:/app/db_adapter.py
      - ../db_server.py:/app/db_server.py
      - ../templates:/app/templates
      - ../static:/app/static
      - /run/pcscd/pcscd.comm:/run/pcscd/pcscd.comm
    ports:
      - "5000:5000"
    environment:
      - DB_TYPE=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-oiteru}
      - MYSQL_USER=${MYSQL_USER:-oiteru_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - OITERU_ADMIN_PASSWORD=${OITERU_ADMIN_PASSWORD}
      - OITERU_STRICT_SECURITY=${OITERU_STRICT_SECURITY:-true}
      - ADMIN_SESSION_MINUTES=${ADMIN_SESSION_MINUTES:-30}
      - ADMIN_LOGIN_MAX_ATTEMPTS=${ADMIN_LOGIN_MAX_ATTEMPTS:-5}
      - ADMIN_LOGIN_BLOCK_WINDOW_SECONDS=${ADMIN_LOGIN_BLOCK_WINDOW_SECONDS:-900}
      - PCSCLITE_SOCKET=/run/pcscd/pcscd.comm
    env_file:
      - ../.env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - oiteru_network

volumes:
  mysql_data:
    driver: local

networks:
  oiteru_network:
    driver: bridge
